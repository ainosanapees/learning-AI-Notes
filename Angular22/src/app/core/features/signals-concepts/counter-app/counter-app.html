<!-- Main Container with better spacing -->
<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  
  <div class="max-w-md w-full">
    
    <!-- Improved Heading with proper spacing -->
    <div class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text 
                 bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 
                 inline-block relative pb-3">
        Signal Concepts
        <!-- Decorative underline with proper positioning -->
        <span class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-purple-500 rounded-full"></span>
      </h1>
      <p class="text-sm text-gray-500 mt-3">Learn Angular Signals</p>
    </div>
    
    <!-- Counter Card -->
    <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8">
      
      <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
        ⚡ Counter App
      </h2>
      
      <!-- Count Display -->
      <div class="text-center mb-8">
        <span class="text-7xl font-extrabold text-transparent bg-clip-text 
                     bg-gradient-to-r from-blue-600 to-indigo-600">
          {{ count() }}
        </span>
      </div>
      
      <!-- Buttons -->
      <div class="flex justify-center gap-3 flex-wrap">
        <button (click)="decrement()"
                class="px-6 py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl 
                       transition-all duration-200 transform hover:scale-105 active:scale-95
                       shadow-md hover:shadow-lg">
          −1
        </button>
        
        <button (click)="reset()"
                class="px-6 py-3 bg-gray-500 hover:bg-gray-600 text-white font-bold rounded-xl 
                       transition-all duration-200 transform hover:scale-105 active:scale-95
                       shadow-md hover:shadow-lg">
          0
        </button>
        
        <button (click)="increment()"
                class="px-6 py-3 bg-gradient-to-r from-blue-500 to-blue-600 
                       hover:from-blue-600 hover:to-blue-700 text-white font-bold rounded-xl 
                       transition-all duration-200 transform hover:scale-105 active:scale-95
                       shadow-md hover:shadow-lg">
          +1
        </button>
      </div>
      
    </div>
    
    <!-- Footer -->
    <p class="text-center text-xs text-gray-400 mt-6">
      Built with Angular 22 🚀
    </p>
    
  </div>
  
</div>
