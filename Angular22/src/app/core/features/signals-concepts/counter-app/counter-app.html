<!-- Main Container -->
<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  
  <div class="max-w-md w-full">
    
    <!-- Header Section -->
    <header class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text 
                 bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 
                 inline-block relative pb-3">
        {{ fullname() }}
        <span class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-purple-500 rounded-full"></span>
      </h1>
      <p class="text-sm text-gray-500 mt-3">Learn Angular Signals</p>
    </header>
    
    <!-- Main Content -->
    <main>
      <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8">
        
        <!-- Card Header -->
        <div class="flex items-center justify-center gap-2 mb-6">
          <span class="text-2xl">⚡</span>
          <h2 class="text-2xl font-bold text-center text-gray-800">Counter App</h2>
        </div>
        
        <!-- Counter Display -->
        <div class="text-center mb-8">
          <span class="text-7xl font-extrabold text-transparent bg-clip-text 
                       bg-gradient-to-r from-blue-600 to-indigo-600">
            {{ count() }}
          </span>
        </div>
        
        <!-- Controls -->
        <div class="flex justify-center gap-3 flex-wrap" role="group" aria-label="Counter controls">
          <button (click)="decrement()"
                  class="px-6 py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl 
                         transition-all duration-200 transform hover:scale-105 active:scale-95
                         shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-opacity-50"
                  aria-label="Decrement by 1">
            −1
          </button>
          
          <button (click)="reset()"
                  class="px-6 py-3 bg-gray-500 hover:bg-gray-600 text-white font-bold rounded-xl 
                         transition-all duration-200 transform hover:scale-105 active:scale-95
                         shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-opacity-50"
                  aria-label="Reset to zero">
            0
          </button>
          
          <button (click)="increment()"
                  class="px-6 py-3 bg-gradient-to-r from-blue-500 to-blue-600 
                         hover:from-blue-600 hover:to-blue-700 text-white font-bold rounded-xl 
                         transition-all duration-200 transform hover:scale-105 active:scale-95
                         shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50"
                  aria-label="Increment by 1">
            +1
          </button>
        </div>
        
        <!-- Computed Values -->
        <section class="grid grid-cols-2 gap-3 mt-6 pt-6 border-t border-gray-100">
          <div class="bg-gradient-to-r from-purple-50 to-pink-50 rounded-xl p-3 text-center">
            <p class="text-xs text-gray-500 font-medium">Double</p>
            <p class="text-2xl font-bold text-purple-600">{{ doubleCount() }}</p>
          </div>
          <div class="bg-gradient-to-r from-green-50 to-teal-50 rounded-xl p-3 text-center">
            <p class="text-xs text-gray-500 font-medium">Triple</p>
            <p class="text-2xl font-bold text-green-600">{{ tripleCount() }}</p>
          </div>
        </section>
        
      </div>
    </main>
    
    <!-- Footer -->
    <footer class="text-center text-xs text-gray-400 mt-6">
      <p>Built with Angular 22 🚀</p>
    </footer>
    
  </div>
  
</div>
